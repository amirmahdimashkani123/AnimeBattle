<!DOCTYPE html>
<html>
<head>
    <title>Anime Battle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">
    <h1>⚔️ Anime Battle ⚔️</h1>

    <div class="fighters">
        <div class="player">
            <h2>Hero</h2>
            <p>❤️ HP: <span id="enemyHP">100</span></p>
            
            <div class="bar">
    <div id="enemyBar"></div>
            </div>
        </div>

        <div class="enemy">
            <h2>Enemy</h2>
            <p>❤️ HP: <span id="enemyHP">100</span></p>
            <div class="bar">
    <div id="enemyBar"></div>
            </div>
        </div>
    </div>

    <button onclick="attack()">⚔️ Attack</button>
</div>

<script src="script.js"></script>

</body>
</html>
